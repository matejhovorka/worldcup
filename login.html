<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přihlášení | MS 2026 Tipovačka</title>
  <meta name="description" content="Přihlaste se do tipovací aplikace pro Mistrovství světa 2026.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2rem;
      color: var(--accent);
    }
    .auth-logo h1 { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin: 0; }
    .auth-logo span { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; color: var(--accent); background: rgba(var(--accent-rgb),0.12); padding: 0.2rem 0.5rem; border-radius: 4px; }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--border-radius-lg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 2rem;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--border-card);
    }

    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--border-radius-sm);
      color: var(--input-text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .btn-auth {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--border-radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-auth:hover { opacity: 0.9; }
    .btn-auth:active { transform: scale(0.98); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      border-radius: var(--border-radius-sm);
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .auth-error.show { display: block; }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-logo">
      <img src="https://upload.wikimedia.org/wikipedia/en/thumb/1/17/2026_FIFA_World_Cup_emblem.svg/960px-2026_FIFA_World_Cup_emblem.svg.png"
           alt="FIFA World Cup 2026" style="height:52px;width:auto;">
      <h1>MS 2026</h1>
      <span>TIPOVÁNÍ</span>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Přihlásit se</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrovat se</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
        <div class="auth-error" id="login-error"></div>
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" required autocomplete="email" placeholder="vas@email.cz">
        </div>
        <div class="form-group">
          <label for="login-password">Heslo</label>
          <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-auth" id="btn-login">Přihlásit se</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
        <div class="auth-error" id="register-error"></div>
        <div class="form-group">
          <label for="reg-name">Jméno</label>
          <input type="text" id="reg-name" required autocomplete="name" placeholder="Jan Novák">
        </div>
        <div class="form-group">
          <label for="reg-email">E-mail</label>
          <input type="email" id="reg-email" required autocomplete="email" placeholder="vas@email.cz">
        </div>
        <div class="form-group">
          <label for="reg-password">Heslo <small style="color:var(--text-muted)">(min. 6 znaků)</small></label>
          <input type="password" id="reg-password" required autocomplete="new-password" minlength="6" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-auth" id="btn-register">Vytvořit účet</button>
      </form>
    </div>
  </div>

  <script>
    // If already logged in, redirect to app
    fetch('api/auth.php?action=me', { credentials: 'include', cache: 'no-store' })
      .then(r => r.json())
      .then(d => { if (d.user) window.location.href = './'; })
      .catch(() => {});

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
    }
    function hideError(id) {
      document.getElementById(id).classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError('login-error');
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = 'Přihlašuji…';

      const email    = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res  = await fetch('api/auth.php?action=login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.error) { showError('login-error', data.error); }
        else { window.location.href = './'; }
      } catch (err) {
        showError('login-error', 'Chyba připojení k serveru.');
      } finally {
        btn.disabled = false; btn.textContent = 'Přihlásit se';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError('register-error');
      const btn = document.getElementById('btn-register');
      btn.disabled = true; btn.textContent = 'Vytvářím účet…';

      const name     = document.getElementById('reg-name').value;
      const email    = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      try {
        const res  = await fetch('api/auth.php?action=register', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (data.error) { showError('register-error', data.error); }
        else { window.location.href = './'; }
      } catch (err) {
        showError('register-error', 'Chyba připojení k serveru.');
      } finally {
        btn.disabled = false; btn.textContent = 'Vytvořit účet';
      }
    }
  </script>
</body>
</html>
